<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trace DAG Visualization</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <style>
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica,
          Arial, sans-serif;
        background-color: #f8f9fa;
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .header-bar {
        display: flex;
        gap: 15px;
        align-items: center;
        margin-bottom: 15px;
      }
      select {
        padding: 6px 10px;
        border-radius: 4px;
        border: 1px solid #ced4da;
        font-size: 14px;
      }
      #graph-container {
        width: 900px;
        height: 600px;
        background: white;
        border: 1px solid #dee2e6;
        border-radius: 8px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.05);
        position: relative;
        overflow: hidden;
        cursor: grab;
      }
      #graph-container:active {
        cursor: grabbing;
      }
      .node-rect {
        stroke: #dee2e6;
        stroke-width: 2px;
        rx: 6px;
        ry: 6px;
        cursor: pointer;
        transition: all 0.2s;
      }
      .node:hover .node-rect,
      .node.active .node-rect {
        filter: drop-shadow(0 0 8px rgba(0, 123, 255, 0.6));
        stroke: #0d6efd;
        stroke-width: 3px;
      }
      .node-label {
        font-size: 12px;
        font-weight: 500;
        pointer-events: none;
        fill: #212529;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .node-type-label {
        font-size: 9px;
        font-weight: bold;
        fill: #fff;
        pointer-events: none;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .link {
        fill: none;
        stroke: #adb5bd;
        stroke-width: 2px;
        marker-end: url(#arrow);
      }
      .evidence-link {
        fill: none;
        stroke: #0dcaf0;
        stroke-width: 1.5px;
        stroke-dasharray: 5, 5;
        marker-end: url(#arrow-evidence);
      }
      .fork-link {
        fill: none;
        stroke: #dc3545;
        stroke-width: 2px;
        stroke-dasharray: 4, 4;
        marker-end: url(#arrow-fork);
      }
      .tooltip {
        position: fixed;
        text-align: left;
        padding: 10px 14px;
        font-size: 12px;
        background: rgba(33, 37, 41, 0.95);
        color: #fff;
        border-radius: 4px;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.2s;
        transform: translate(-50%, -100%);
        margin-top: -10px;
        white-space: pre-wrap;
        z-index: 1000;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.2);
      }
      .zoom-controls {
        position: absolute;
        bottom: 15px;
        right: 15px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .zoom-controls button {
        background: white;
        border: 1px solid #dee2e6;
        border-radius: 4px;
        width: 30px;
        height: 30px;
        cursor: pointer;
        font-weight: bold;
        color: #495057;
      }
      .zoom-controls button:hover {
        background: #e9ecef;
      }
    </style>
  </head>
  <body>
    <h2>Single Trace DAG (Dagre)</h2>
    <div class="header-bar">
      <label for="trace-select"><strong>Select Trace:</strong></label>
      <select id="trace-select">
        <option value="">Loading...</option>
      </select>
    </div>
    <p>
      Solid: Sequence | Dashed Cyan: Data Dependency | Red: Fork Branch. Pan and
      Zoom supported.
    </p>
    <div id="graph-container">
      <div id="tooltip" class="tooltip"></div>
      <div class="zoom-controls">
        <button id="zoom-in">+</button>
        <button id="zoom-out">-</button>
        <button id="zoom-reset">⟲</button>
      </div>
    </div>

    <script>
      const width = 900;
      const height = 600;
      const container = d3.select("#graph-container");
      const tooltip = d3.select("#tooltip");

      const svg = container
        .append("svg")
        .attr("width", width)
        .attr("height", height);

      const zoom = d3
        .zoom()
        .scaleExtent([0.1, 4])
        .on("zoom", (e) => {
          gMain.attr("transform", e.transform);
        });

      svg.call(zoom);

      d3.select("#zoom-in").on("click", () =>
        svg.transition().call(zoom.scaleBy, 1.2),
      );
      d3.select("#zoom-out").on("click", () =>
        svg.transition().call(zoom.scaleBy, 0.8),
      );
      d3.select("#zoom-reset").on("click", () =>
        svg.transition().call(zoom.transform, d3.zoomIdentity),
      );

      const defs = svg.append("defs");

      function createMarker(id, color) {
        defs
          .append("marker")
          .attr("id", id)
          .attr("viewBox", "0 -5 10 10")
          .attr("refX", 8)
          .attr("refY", 0)
          .attr("markerWidth", 6)
          .attr("markerHeight", 6)
          .attr("orient", "auto")
          .append("path")
          .attr("fill", color)
          .attr("d", "M0,-5L10,0L0,5");
      }

      createMarker("arrow", "#adb5bd");
      createMarker("arrow-evidence", "#0dcaf0");
      createMarker("arrow-fork", "#dc3545");

      const gMain = svg.append("g");

      const colorScale = d3
        .scaleOrdinal()
        .domain(["tool", "llm", "observation", "decision", "start", "fork"])
        .range([
          "#20c997",
          "#fd7e14",
          "#6c757d",
          "#0dcaf0",
          "#343a40",
          "#dc3545",
        ]);

      async function loadDropdown() {
        const res = await fetch("/api/runs");
        const data = await res.json();
        const select = document.getElementById("trace-select");
        select.innerHTML = "";

        let validRuns = data.runs.filter((r) => !r.error);
        if (validRuns.length === 0) {
          select.innerHTML = "<option>No traces available</option>";
          return;
        }

        validRuns.forEach((run) => {
          const option = document.createElement("option");
          option.value = run.run_id;
          option.textContent = `${run.run_id} (${run.ticket_id}) - ${run.steps} steps`;
          select.appendChild(option);
        });

        loadTrace(validRuns[0].run_id);

        select.addEventListener("change", (e) => {
          loadTrace(e.target.value);
        });
      }

      async function loadTrace(runId) {
        if (!runId) return;
        const res = await fetch(`/api/runs/${runId}`);
        const data = await res.json();
        renderGraph(data.record.steps);
      }

      function renderGraph(steps) {
        gMain.selectAll("*").remove();
        if (!steps || steps.length === 0) return;

        const g = new dagre.graphlib.Graph();
        g.setGraph({
          rankdir: "TB",
          nodesep: 50,
          ranksep: 80,
          marginx: 40,
          marginy: 40,
        });
        g.setDefaultEdgeLabel(() => ({}));

        // Map steps to nodes
        const nodeWidth = 140;
        const nodeHeight = 50;

        g.setNode("start", {
          id: "start",
          label: "START",
          type: "start",
          latency: 0,
          width: 80,
          height: 40,
          rx: 20,
          ry: 20,
        });

        steps.forEach((s) => {
          const latency =
            (s.tool && s.tool.latency_ms) || (s.llm && s.llm.latency_ms) || 0;
          let lbl = s.intent || s.kind;
          if (lbl.length > 20) lbl = lbl.substring(0, 17) + "...";

          g.setNode(s.step_id.toString(), {
            id: s.step_id.toString(),
            label: lbl,
            type: s.kind,
            latency: latency,
            tool_name: s.tool ? s.tool.tool_name : null,
            error: s.tool ? s.tool.error : null,
            width: nodeWidth,
            height: nodeHeight,
            fullData: s,
          });
        });

        // Simulated fork step for rendering requirement
        const lastStep = steps[steps.length - 1];
        if (lastStep && lastStep.step_id > 2) {
          const divId = "div_" + lastStep.step_id;
          g.setNode(divId, {
            id: divId,
            label: "Mock Fork Edit",
            type: "fork",
            latency: 0,
            width: nodeWidth,
            height: nodeHeight,
            fullData: { note: "Example of fork branch rendering" },
          });

          g.setEdge(steps[steps.length - 2].step_id.toString(), divId, {
            edgeType: "fork",
          });
        }

        // Link from START
        g.setEdge("start", steps[0].step_id.toString(), {
          edgeType: "sequence",
        });

        // Sequence Links
        for (let i = 0; i < steps.length - 1; i++) {
          g.setEdge(
            steps[i].step_id.toString(),
            steps[i + 1].step_id.toString(),
            { edgeType: "sequence" },
          );
        }

        // Evidence Links
        steps.forEach((step) => {
          if (step.evidence && step.evidence.length > 0) {
            step.evidence.forEach((ev) => {
              if (ev.source && ev.source.startsWith("step:")) {
                const srcId = ev.source.split(":")[1];
                if (!g.hasEdge(srcId, step.step_id.toString())) {
                  g.setEdge(srcId, step.step_id.toString(), {
                    edgeType: "evidence",
                  });
                }
              }
            });
          }
        });

        // Calculate layout
        dagre.layout(g);

        // Render Edges
        const line = d3
          .line()
          .x((d) => d.x)
          .y((d) => d.y);

        g.edges().forEach((e) => {
          const edgeData = g.edge(e);
          let className = "link";
          if (edgeData.edgeType === "evidence") className = "evidence-link";
          if (edgeData.edgeType === "fork") className = "fork-link";

          gMain
            .append("path")
            .attr("class", className)
            .attr("d", line(edgeData.points));
        });

        // Render Nodes
        g.nodes().forEach((v) => {
          const nodeData = g.node(v);
          const group = gMain
            .append("g")
            .attr("class", "node")
            .attr("transform", `translate(${nodeData.x},${nodeData.y})`)
            .style("opacity", nodeData.type === "fork" ? 0.8 : 1)
            .on("mouseover", function (event) {
              d3.select(this).classed("active", true);
              let details = `<strong>${nodeData.label}</strong>\nType: ${nodeData.type}\nLatency: ${nodeData.latency}ms`;
              if (nodeData.tool_name)
                details += `\nTool: ${nodeData.tool_name}`;
              if (nodeData.error) details += `\nError: ${nodeData.error}`;
              if (nodeData.type === "fork")
                details = `<strong>${nodeData.label}</strong>\n${nodeData.fullData.note}`;

              tooltip
                .style("opacity", 1)
                .html(details)
                .style("left", event.clientX + "px")
                .style("top", event.clientY + "px");
            })
            .on("mouseout", function () {
              d3.select(this).classed("active", false);
              tooltip.style("opacity", 0);
            });

          group
            .append("rect")
            .attr("class", "node-rect")
            .attr("x", -nodeData.width / 2)
            .attr("y", -nodeData.height / 2)
            .attr("width", nodeData.width)
            .attr("height", nodeData.height)
            .attr("rx", nodeData.rx || 6)
            .attr("ry", nodeData.ry || 6)
            .attr("fill", nodeData.error ? "#f8d7da" : "#ffffff")
            .style(
              "stroke",
              nodeData.error ? "#dc3545" : colorScale(nodeData.type),
            )
            .style("stroke-dasharray", nodeData.type === "fork" ? "6,6" : null);

          // Background for node type tag
          if (nodeData.type !== "start") {
            group
              .append("path")
              .attr(
                "d",
                `M ${-nodeData.width / 2},${-nodeData.height / 2} l 40,0 l 10,18 l -50,0 Z`,
              )
              .attr(
                "fill",
                nodeData.error ? "#dc3545" : colorScale(nodeData.type),
              );

            group
              .append("text")
              .attr("class", "node-type-label")
              .attr("x", -nodeData.width / 2 + 20)
              .attr("y", -nodeData.height / 2 + 8)
              .text(nodeData.type.toUpperCase());
          }

          group
            .append("text")
            .attr("class", "node-label")
            .attr("x", 0)
            .attr("y", nodeData.type === "start" ? 0 : 5)
            .text(nodeData.label);
        });

        // Auto-center graph
        const graphWidth = g.graph().width;
        const graphHeight = g.graph().height;
        const initialScale =
          Math.min(width / graphWidth, height / graphHeight) * 0.9;
        const xCenterOffset = (width - graphWidth * initialScale) / 2;
        const yCenterOffset = (height - graphHeight * initialScale) / 2;

        svg.call(
          zoom.transform,
          d3.zoomIdentity
            .translate(xCenterOffset, Math.max(20, yCenterOffset))
            .scale(initialScale),
        );
      }

      loadDropdown();
    </script>
  </body>
</html>
